services:
  # PostgreSQL Database
  postgres:
    image: postgres:14
    container_name: jira-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mini_jira
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - jira-network

  # Backend API (Bun)
  api:
    build:
      context: ./jira-api
      dockerfile: Dockerfile
    container_name: jira-api
    ports:
      - "8000:8000"
    env_file:
      - ./jira-api/.env
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/mini_jira"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "bun run database/migrate.ts && bun run database/seed.ts && bun run src/index.ts"
    networks:
      - jira-network
    restart: unless-stopped

  # Frontend (Next.js)
  frontend:
    build:
      context: ./jira-front
      dockerfile: Dockerfile
    container_name: jira-front
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    networks:
      - jira-network
    restart: unless-stopped

volumes:
  postgres_data:


networks:
  jira-network:
    driver: bridge
